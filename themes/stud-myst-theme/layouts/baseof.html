<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}" dir="{{ or site.Language.Direction `ltr` }}">

<head>
  {{ partial "head.html" . }}
</head>

<body>
  <header>
    {{ partial "header.html" . }}
  </header>
  <div class="container">
    <div class="container-sides"></div>
    <div class="container-center">
      <main>
        {{ block "main" . }}{{ end }}
      </main>
    </div>
    <div class="container-sides"></div>
  </div>
  <div class="layout-bar">
    <footer>
      {{ partial "footer.html" . }}
    </footer>
  </div>
</body>

</html>
